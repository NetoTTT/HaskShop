# HaskShop - Configuracao de Lojas de NPC
#
# Para criar uma loja de NPC:
#   1. Crie um NPC com /npc create <nome>
#   2. Selecione-o com /npc select - o ID aparece na tela
#   3. Configure no Citizens: /npc command add hs shop <shopId>
#   4. Adicione o shopId abaixo com os itens desejados
#   5. Use /hs reload para ativar sem reiniciar
#
# Cada item pode ter:
#   mob: ZOMBIE           <- spawner de mob especifico
#   item: DIAMOND         <- qualquer item do Minecraft
#   buy_price: 5000.0     <- preco para o player COMPRAR (omita se nao for compravel)
#   sell_price: 3500.0    <- preco para o player VENDER (omita se nao for vendavel)
#   amount: 1             <- quantidade por unidade de transacao
#   quantity_free: false  <- se true, player escolhe quantas unidades antes do checkout
#
# Clique esquerdo = Comprar  |  Clique direito = Vender
#
# Mobs disponiveis:
#   Hostis:  ZOMBIE, SKELETON, SPIDER, CAVE_SPIDER, CREEPER, BLAZE, GHAST,
#            MAGMA_CUBE, PIG_ZOMBIE, ENDERMAN, SLIME, WITCH, SILVERFISH, ENDERMITE, GUARDIAN
#   Neutros: WOLF, BAT, OCELOT
#   Passivos: PIG, SHEEP, COW, CHICKEN, SQUID, MUSHROOM_COW, SNOWMAN,
#             IRON_GOLEM, HORSE, RABBIT, VILLAGER

shops:
  # NPC de teste - ID 196
  196:
    name: "§5§lLoja de Spawners"
    items:
      - mob: ZOMBIE
        buy_price: 50000.0
        amount: 1
      - mob: SKELETON
        buy_price: 75000.0
        amount: 1
      - mob: CREEPER
        buy_price: 90000.0
        amount: 1
      - mob: BLAZE
        buy_price: 200000.0
        amount: 1
      - mob: ENDERMAN
        buy_price: 180000.0
        amount: 1

  # Loja de recursos com BUY e SELL no mesmo item + quantity_free
  loja_recursos:
    name: "§6§lRecursos"
    items:
      - item: DIAMOND
        buy_price: 5000.0
        sell_price: 3500.0
        amount: 1
        quantity_free: true
      - item: IRON_INGOT
        buy_price: 500.0
        sell_price: 300.0
        amount: 64
        quantity_free: true
      - item: GOLD_INGOT
        buy_price: 1000.0
        sell_price: 700.0
        amount: 32
      - item: COAL
        sell_price: 50.0
        amount: 64
        quantity_free: true
