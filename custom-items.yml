# HaskShop - Itens Customizados com NBT
#
# Cada item recebe um hask_id unico no NBT, permitindo identificacao precisa.
# Use /hs give <player> <id> [amount] para dar itens.
#
# Campos disponiveis:
#   material:      nome do material em ingles maiusculo (ex: DIAMOND_PICKAXE)
#   data:          data value do item (opcional, default 0)
#   amount:        quantidade padrao ao dar com /hs give (opcional, default 1)
#   name:          nome de exibicao (suporta cores com &)
#   lore:          lista de linhas de descricao
#   enchantments:  lista no formato NOME:NIVEL (ex: SILK_TOUCH:1)
#   nbt:           tags NBT extras (string ou int)
#
# Para vender no NPC shop, use custom-item: <id> no npc-shops.yml

items:
  picareta_silk2:
    material: DIAMOND_PICKAXE
    name: "§ePicareta Silk Touch 2"
    lore:
      - ""
      - "§4* §7Com esta picareta voce consegue"
      - "§4* §7quebrar blocos especiais"
    enchantments:
      - SILK_TOUCH:1
      - DIG_SPEED:5
      - DURABILITY:3

  gerador_bedrock:
    material: BEDROCK
    name: "§4§lGerador de Bedrock"
    lore:
      - ""
      - "§7Coloque no chao para gerar"
      - "§7um pilar de bedrock"
      - ""
      - "§6Usos: §f50"
    nbt:
      usos: 50

